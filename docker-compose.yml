services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: intentia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: intentia
    volumes:
      - intentia_postgres:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intentia -d intentia"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    env_file: .env
    command: uvicorn intentia_amoris.api:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    read_only: false

  bot:
    build: .
    env_file: .env
    command: python -m intentia_amoris.telegram_bot
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  intentia_postgres:
