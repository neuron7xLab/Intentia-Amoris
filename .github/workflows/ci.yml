name: intentia-ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      INTENTIA_ENV: test
      INTENTIA_ALLOW_INSECURE_DEV: "true"
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: make check
